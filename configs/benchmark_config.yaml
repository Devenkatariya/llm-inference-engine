benchmark:
  warmup_runs: 3
  eval_runs: 50
  batch_sizes: [1, 2, 4, 8]
  input_lengths: [64, 128, 256, 512]
  output_lengths: [128, 256, 512]
  precisions: ["fp16", "int8", "int4"]
  track_memory: true

mlflow:
  tracking_uri: "http://localhost:5000"
  experiment_name: "phi3-mini-inference-benchmark"
  log_artifacts: true

output:
  results_dir: "results"
  save_plots: true
  plot_dpi: 150
